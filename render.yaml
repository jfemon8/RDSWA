# =============================================================================
# Render Blueprint — RDSWA Backend (Free Tier)
# https://render.com/docs/blueprint-spec
# =============================================================================

services:
  # --------------------------------------------------------------------------
  # Web Service — Express API
  # --------------------------------------------------------------------------
  - type: web
    name: rdswa-server
    runtime: node
    region: singapore
    plan: free
    branch: main
    buildCommand: npm ci && npm run build --workspace=shared && npm run build --workspace=server
    startCommand: node server/dist/app.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 365d
      - key: CLIENT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      # Resend HTTP API — works on Render free tier (port 443).
      # The KEY is committed; the VALUE is set once in the Render dashboard
      # and never touches git.
      - key: RESEND_API_KEY
        sync: false
      # Non-secret — committed directly so it's auto-applied on push.
      # Domain verified on Resend.
      - key: EMAIL_FROM
        value: RDSWA <noreply@rdswa.info.bd>
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
    autoDeploy: true
