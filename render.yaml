# =============================================================================
# Render Blueprint — RDSWA Backend (Free Tier)
# https://render.com/docs/blueprint-spec
# =============================================================================

services:
  # --------------------------------------------------------------------------
  # Web Service — Express API
  # --------------------------------------------------------------------------
  - type: web
    name: rdswa-server
    runtime: node
    region: singapore
    plan: free
    branch: main
    buildCommand: npm ci && npm run build --workspace=shared && npm run build --workspace=server
    startCommand: node server/dist/app.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: CLIENT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
    autoDeploy: true
