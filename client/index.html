<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0" />
    <meta name="description" content="Official platform of Rangpur Divisional Student Welfare Association, University of Barishal. Member directory, events, notices, committees, and more." />
    <meta name="theme-color" content="#008f57" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#042f1f" media="(prefers-color-scheme: dark)" />
    <!-- Declares the page supports both colour schemes. Without this, Android
         WebView (and some iOS embedded browsers) force light mode regardless
         of the OS setting and make `prefers-color-scheme` media queries lie. -->
    <meta name="color-scheme" content="light dark" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="RDSWA - Rangpur Divisional Student Welfare Association" />
    <meta property="og:description" content="Official platform of Rangpur Divisional Student Welfare Association, University of Barishal." />
    <meta property="og:image" content="/icons/icon-512x512.png" />
    <meta property="og:site_name" content="RDSWA" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RDSWA - Rangpur Divisional Student Welfare Association" />
    <meta name="twitter:description" content="Official platform of Rangpur Divisional Student Welfare Association, University of Barishal." />
    <meta name="twitter:image" content="/icons/icon-512x512.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Google AdSense ownership verification.
         Hardcoded as a static <meta> (NOT JS-injected) because the AdSense
         site-review crawler issues a plain HTTP fetch and looks for this
         tag in the raw HTML response — it does not reliably execute JS for
         the verification step. The publisher ID is public information
         (visible in every served page anyway), so committing it is safe. -->
    <meta name="google-adsense-account" content="ca-pub-1036044341182474" />

    <!-- Google Search Console site ownership verification. Same constraint as
         AdSense: GSC's verification crawler reads the raw HTML response, so
         this MUST be a static tag (not injected by react-helmet at runtime).
         Required to submit /sitemap.xml and view indexing reports. -->
    <meta name="google-site-verification" content="fuobzYJ0CaxpVnoQthO1nUT2_EfKd445J8pPB3035lU" />

    <!-- Google AdSense script loader.
         The script tag itself is env-gated — when VITE_ADSENSE_CLIENT is
         unset (local dev), no network request is made and dev consoles
         stay clean. In production the env var is set in Vercel and the
         actual `adsbygoogle.js` script loads. The meta tag above is
         independent of this gate so verification works in every env. -->
    <script>
      (function () {
        var c = '%VITE_ADSENSE_CLIENT%';
        if (!c || c.indexOf('ca-pub-') !== 0) return;
        var s = document.createElement('script');
        s.async = true;
        s.crossOrigin = 'anonymous';
        s.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=' + c;
        document.head.appendChild(s);
      })();
    </script>
    <title>RDSWA - Rangpur Divisional Student Welfare Association</title>
    <!-- FOUC prevention: resolve theme BEFORE React hydrates so the very first
         paint uses the correct mode. Priority: localStorage → system → light.
         Mirrors the logic in src/stores/themeStore.ts; keep them in sync. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var isDark =
            saved === 'dark' ||
            ((saved === 'system' || saved == null) &&
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          var root = document.documentElement;
          if (isDark) root.classList.add('dark');
          root.dataset.theme = isDark ? 'dark' : 'light';
        } catch (e) { /* localStorage blocked — fall back to light */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
